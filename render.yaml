services:
  - type: web
    name: greenmind-mcp-server
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements-mcp.txt
    startCommand: uvicorn greenmind_mcp:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.8